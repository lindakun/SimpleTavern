<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

    <!-- 主题色（状态栏适配） -->
    <meta name="theme-color" content="#090A0F" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#090A0F" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#090A0F" />

    <!-- iOS Safari 全屏体验 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Yuzu AI" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- 预连接 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- 预加载关键资源（LCP 优化） -->
    <link rel="preload" href="/yuzuai_logo.png" as="image" fetchpriority="high" />

    <!-- 字体预加载（只加载首屏需要的子集字符） -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap&text=YuzuAINeonFrontierExplorethe0123456789" as="style" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap&text=YuzuAINeonFrontierExplorethe0123456789" />

    <!-- DNS 预解析 -->
    <link rel="dns-prefetch" href="https://lh3.googleusercontent.com" />

    <title>Yuzu AI</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
