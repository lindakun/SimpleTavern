services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: simple-tavern-backend
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    environment:
      - PORT=8001
      - NODE_ENV=production
      - SIMPLE_TAVERN_DATA_ROOT=/data
      # ACTIVE_LLM 由 backend/.env 控制，不在此硬编码
      # Google OAuth credentials should be set in backend/.env
      # SIMPLE_TAVERN_GOOGLE_CLIENT_ID=
      # SIMPLE_TAVERN_GOOGLE_CLIENT_SECRET=
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # 共享原项目的数据目录（本地开发）
      - ${SIMPLE_TAVERN_DATA_ROOT:-/Users/linda/code/SillyTavern/data}:/data
      # ugirl 数据目录（JSON + avatars_processed，用于批量导入）
      - /home/ubuntu/code/ugirl_craw/output:/ugirl_data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8001/version"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: simple-tavern-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: simple-tavern-admin
    ports:
      - "3002:3002"
    depends_on:
      - backend
    restart: unless-stopped
